<style>
  /* 1200x630 social card. Built from the site's own CSS so it can never drift from the brand
     again. Rendered with browse at 1200x630 and saved over assets/og.png. */
  html,body{margin:0;padding:0;background:var(--oats);width:1200px;height:630px;overflow:hidden}
  body{background:var(--oats) repeating-linear-gradient(0deg,transparent 0 33px,rgba(65,77,87,.055) 33px 34px)}
  .og-stage{position:relative;width:1200px;height:630px;display:grid;place-items:center}
  .og-card{position:relative;width:1104px;height:534px;isolation:isolate}
  .og-card>.sheet{position:absolute;inset:0;z-index:0;background:var(--paper);
    background-image:repeating-linear-gradient(0deg,transparent 0 33px,rgba(65,77,87,.06) 33px 34px);
    border:3px solid var(--ink);border-radius:8px;filter:url(#torn);box-shadow:11px 12px 0 0 var(--ink)}
  .og-in{position:relative;z-index:2;padding:58px 64px;height:100%;box-sizing:border-box;
    display:flex;flex-direction:column}
  .og-eyebrow{font-family:var(--f-hand);font-size:34px;color:var(--colorado);
    transform:rotate(-1deg);margin:0 0 14px}
  .og-h{font-family:var(--f-slab);font-style:italic;font-weight:700;font-size:96px;line-height:1.02;
    letter-spacing:-.02em;color:var(--ink);margin:0}
  .og-h .hl{position:relative;display:inline;z-index:0}
  .og-h .hl::before{content:"";position:absolute;left:-.16em;right:-.2em;top:.1em;bottom:-.02em;z-index:-1;
    background:var(--happy);mix-blend-mode:multiply;transform:rotate(-.8deg) skewX(-5deg);
    filter:url(#rough);border-radius:2px}
  .og-h .stop{color:var(--grass-deep)}
  .og-foot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between}
  .og-mark{width:190px;height:auto;display:block}
  .og-url{font-family:var(--f-mono);font-size:26px;letter-spacing:.06em;color:var(--sambas);text-align:right}
  .og-url b{display:block;font-family:var(--f-hand);font-weight:400;font-size:32px;
    color:var(--grass-deep);letter-spacing:0;margin-bottom:6px}
  .tape{position:absolute;width:190px;height:48px;background:var(--happy);opacity:.72;
    top:-22px;left:96px;transform:rotate(-3deg);z-index:3;filter:url(#roughsm)}
</style>
</head>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="3" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/></filter>
  <filter id="roughsm"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G"/></filter>
  <filter id="torn"><feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="4" seed="11" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/></filter>
</svg>
